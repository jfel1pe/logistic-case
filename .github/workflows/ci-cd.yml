name: CI/CD Pipeline — Logistic API

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:

  # ─────────────────────────────────────
  # JOB 1 — Build y pruebas
  # ─────────────────────────────────────
  build-and-test:
    name: Build y Pruebas Unitarias
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configura Java 21
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Compila el proyecto
      - name: Compilar con Maven
        run: mvn clean compile

      # 4. Corre las pruebas unitarias
      - name: Correr pruebas unitarias
        run: mvn test

      # 5. Genera el reporte de pruebas
      - name: Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

      # 6. Genera el .jar
      - name: Generar .jar
        run: mvn clean package -DskipTests

      # 7. Guarda el .jar como artefacto
      - name: Guardar .jar
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ─────────────────────────────────────
  # JOB 2 — Build imagen Docker
  # ─────────────────────────────────────
  docker-build:
    name: Build imagen Docker
    runs-on: ubuntu-latest
    needs: build-and-test  # espera que el Job 1 termine exitosamente

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generar .jar
        run: mvn clean package -DskipTests

      # Construye la imagen Docker
      - name: Build imagen Docker
        run: docker build -t logistic-api:latest .

      # Verifica que la imagen se construyó correctamente
      - name: Verificar imagen Docker
        run: docker images logistic-api